version: '3.9'

services:
  # MongoDB service
  mongo:
    image: mongo:7
    container_name: taskapp-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db # Persists data between restarts
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: taskapp

  # Node.js app service
  app:
    build: .
    container_name: taskapp-node
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      MONGO_URI: ${MONGO_URI} # Uses Docker service name 'mongo'
    depends_on:
      - mongo

# Named volume so MongoDB data persists
volumes:
  mongo-data:
